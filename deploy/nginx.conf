# 宿主机 nginx 反向代理 → 前端容器(docker-compose.prod.yml 里 web 绑的 127.0.0.1:8081)。
# 部署:
#   sudo cp deploy/nginx.conf /etc/nginx/conf.d/airportbus.conf
#   sudo rm -f /etc/nginx/sites-enabled/default      # 关掉 apt 默认欢迎页
#   sudo nginx -t && sudo systemctl reload nginx
# 上 HTTPS(需域名 + 安全组放行 80/443):
#   sudo apt install -y certbot python3-certbot-nginx
#   sudo certbot --nginx -d gatebus.fpfos.com        # 自动加 443/证书/跳转
#
# 前端容器内那层 nginx 已处理 /api/ 反代到后端与 SPA 路由,本层只无脑转发。

server {
    listen 80;
    server_name gatebus.fpfos.com;        # 改成你自己的域名

    location / {
        proxy_pass http://127.0.0.1:8081;
        proxy_set_header Host              $host;
        proxy_set_header X-Real-IP         $remote_addr;
        proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }
}
